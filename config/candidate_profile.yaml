name: "CIO / Директор по ИТ / CDTO"

target_roles:
  - "CIO"
  - "CDTO"
  - "CTO"
  - "Директор по ИТ"
  - "Директор по информационным технологиям"
  - "Директор по цифровой трансформации"
  - "Руководитель ИТ-департамента"
  - "Вице-президент по ИТ"

# ---------------------------------------------------------------------------
# Scoring groups — каждая группа вносит свой вклад в итоговый score.
# Сумма weight = 100. Внутри группы достаточно найти ~50% ключевых слов
# для получения полного балла группы (частичное совпадение приветствуется).
# ---------------------------------------------------------------------------
scoring_groups:

  role_fit:
    weight: 25
    keywords:
      - "CIO"
      - "CDTO"
      - "CTO"
      - "директор по ИТ"
      - "директор по информационным технологиям"
      - "директор по цифровой трансформации"
      - "ИТ-директор"
      - "руководитель ИТ"
      - "ИТ-стратегия"
